<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Vault — Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --card: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8c97a;
      --accent2: #c45e3e;
      --text: #f0ece4;
      --muted: #6b6560;
      --tag-bg: #221f1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.5;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 72px;
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    nav a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }

    /* Hero */
    .hero {
      padding: 80px 48px 60px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.6s forwards 0.1s;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
      max-width: 700px;
      opacity: 0;
      animation: fadeUp 0.6s forwards 0.2s;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-sub {
      margin-top: 20px;
      color: var(--muted);
      font-size: 1rem;
      max-width: 420px;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 0.6s forwards 0.3s;
    }

    /* Search */
    .search-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px 48px;
      opacity: 0;
      animation: fadeUp 0.6s forwards 0.4s;
    }

    .search-wrap {
      position: relative;
      max-width: 500px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 14px 20px 14px 48px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,201,122,0.1);
    }

    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
    }

    /* Grid */
    .grid-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 48px 80px;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    #pdf-count {
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
    }

    .pdf-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* PDF Card */
    .pdf-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 28px;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.5s forwards;
    }

    .pdf-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 0;
      background: var(--accent);
      transition: height 0.3s;
    }

    .pdf-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }

    .pdf-card:hover::before { height: 100%; }

    .card-icon {
      width: 44px;
      height: 56px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      position: relative;
    }

    .card-icon::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      border-style: solid;
      border-width: 0 10px 10px 0;
      border-color: var(--bg) var(--bg) var(--border) transparent;
    }

    .card-icon svg { color: var(--accent2); }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 18px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .card-tag {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      padding: 3px 10px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .card-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
    }

    .open-btn {
      margin-top: 16px;
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .open-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    /* Empty / Loading states */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state p { font-size: 0.9rem; line-height: 1.7; }

    .loading-pulse {
      grid-column: 1/-1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px;
      gap: 8px;
    }

    .dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--card);
      border: 1px solid var(--accent);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      padding: 14px 20px;
      z-index: 9999;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* Responsive */
    @media (max-width: 640px) {
      header { padding: 0 24px; }
      .hero, .search-bar, .grid-section { padding-left: 24px; padding-right: 24px; }
      .hero { padding-top: 48px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">PDF <span>Vault</span></div>
  <nav>
    <a href="admin.html">Admin →</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-eyebrow">/ Document Library</div>
  <h1>Every document,<br><em>one place.</em></h1>
  <p class="hero-sub">Browse and open curated PDF resources. All documents are stored by link — no uploads required.</p>
</section>

<div class="search-bar">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search by title, tag, or description…"/>
  </div>
</div>

<section class="grid-section">
  <div class="section-label">
    Documents
    <span id="pdf-count"></span>
  </div>
  <div class="pdf-grid" id="pdfGrid">
    <div class="loading-pulse">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
</section>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ── 🔧 REPLACE WITH YOUR FIREBASE CONFIG ──────────────────────────────────
  const firebaseConfig = {
  apiKey: "AIzaSyBE3liqTY30a6kw4WzknuDI5wRMbjYC8zQ",
  authDomain: "th-7e1b4.firebaseapp.com",
  databaseURL: "https://th-7e1b4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "th-7e1b4",
  storageBucket: "th-7e1b4.firebasestorage.app",
  messagingSenderId: "177367546112",
  appId: "1:177367546112:web:70577d77bd8985bbab9be5"
};
  // ──────────────────────────────────────────────────────────────────────────

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  let allDocs = [];

  function formatDate(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  }

  function renderCard(doc, idx) {
    return `
      <div class="pdf-card" style="animation-delay:${idx * 0.07}s" onclick="openPDF('${doc.url}')">
        <div class="card-icon">
          <svg width="18" height="22" viewBox="0 0 18 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 1H3a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7L10 1z"/>
            <path d="M10 1v6h6"/>
            <line x1="5" y1="12" x2="13" y2="12"/><line x1="5" y1="16" x2="9" y2="16"/>
          </svg>
        </div>
        <div class="card-title">${doc.title || 'Untitled Document'}</div>
        <div class="card-desc">${doc.description || 'No description provided.'}</div>
        <div class="card-meta">
          <span class="card-tag">${doc.category || 'PDF'}</span>
          <span class="card-date">${formatDate(doc.createdAt)}</span>
        </div>
        <button class="open-btn">Open PDF →</button>
      </div>`;
  }

  function renderGrid(docs) {
    const grid = document.getElementById('pdfGrid');
    const count = document.getElementById('pdf-count');
    if (!docs.length) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">📂</div><p>No documents yet.<br>Visit the admin panel to add PDFs.</p></div>`;
      count.textContent = '';
      return;
    }
    count.textContent = `${docs.length} file${docs.length !== 1 ? 's' : ''}`;
    grid.innerHTML = docs.map((d, i) => renderCard(d, i)).join('');
  }

  // Live listener
  const q = query(collection(db, 'pdfs'), orderBy('createdAt', 'desc'));
  onSnapshot(q, snap => {
    allDocs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderGrid(allDocs);
  }, err => {
    document.getElementById('pdfGrid').innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><p>Could not load documents.<br><small style="color:#c45e3e">${err.message}</small></p></div>`;
  });

  // Search
  document.getElementById('searchInput').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    const filtered = allDocs.filter(d =>
      (d.title || '').toLowerCase().includes(q) ||
      (d.description || '').toLowerCase().includes(q) ||
      (d.category || '').toLowerCase().includes(q)
    );
    renderGrid(filtered);
  });

  // Open PDF
  window.openPDF = (url) => {
    if (!url) { showToast('No URL found for this document.'); return; }
    window.open(url, '_blank');
  };

  // Toast
  window.showToast = (msg) => {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  };
</script>
</body>
</html>
